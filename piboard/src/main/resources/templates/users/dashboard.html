<!--Dashboard-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/home.css}"/>
</head>
<body>
    <!--Top-->
    <header>
        <h1>(&pi;) pi_board</h1>
    </header>
    <h2>Welcome, <span th:text="${#authentication.name}"></span>! </h2>

    <div class="vertical-button">
        <a th:href="@{/logout}">
            <button type="submit" class="pibutton">Logout</button>
        </a>

        <a th:href="@{/issues}">
            <button type="submit" class="pibutton">My Issues</button>
        </a>
    </div>
</body>
</html>
